name: slidebolt

services:
  nats:
    image: nats:2.11-alpine
    container_name: slidebolt-nats
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
    dns:
      - 192.168.88.1
    volumes:
      - /media/gavin/storage1tb/containers/slidebolt/nats:/data
    restart: unless-stopped

  slidebolt:
    image: ghcr.io/slidebolt/slidebolt:latest
    container_name: slidebolt-runtime
    network_mode: host
    depends_on:
      - nats
    dns:
      - 192.168.88.1
    environment:
      LAUNCHER_PREBUILT: "true"
      LAUNCHER_SKIP_NATS: "true"
      LAUNCHER_API_HOST: "0.0.0.0"
      LAUNCHER_API_PORT: "39011"
      LAUNCHER_NATS_HOST: "127.0.0.1"
      LAUNCHER_NATS_PORT: "4222"
    volumes:
      - /media/gavin/storage1tb/containers/slidebolt/config:/opt/slidebolt/config
      - /media/gavin/storage1tb/containers/slidebolt/data:/opt/slidebolt/.build/data
      - /media/gavin/storage1tb/containers/slidebolt/logs:/opt/slidebolt/.build/logs
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: slidebolt-ui-db
    networks:
      - internal
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - /media/gavin/storage1tb/containers/slidebolt-ui/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    image: ghcr.io/slidebolt/ui-api:latest
    container_name: slidebolt-ui-api
    networks:
      - internal
    env_file: /home/gavin/work/slidebolt/ui/.env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/slidebolt/ui-web:latest
    container_name: slidebolt-ui-web
    networks:
      - shared-proxy
      - internal
    depends_on:
      - api
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.slidebolt-web.rule=Host(`smarthome.357graphics.com`)"
      - "traefik.http.routers.slidebolt-web.entrypoints=websecure"
      - "traefik.http.routers.slidebolt-web.tls=true"
      - "traefik.http.routers.slidebolt-web.tls.certresolver=le"
      - "traefik.http.routers.slidebolt-web.tls.domains[0].main=*.357graphics.com"
      - "traefik.http.services.slidebolt-web.loadbalancer.server.port=40003"

networks:
  shared-proxy:
    external: true
  internal:
    driver: bridge
