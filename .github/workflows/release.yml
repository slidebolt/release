name: Release

on:
  workflow_dispatch:
    inputs:
      release_guard:
        description: "Guard token. Use scripts/release-safe.sh"
        required: true
        type: string
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: slidebolt/slidebolt

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Enforce release guard
        if: github.event_name == 'workflow_dispatch'
        run: |
          expected_sha256="aa7e759ce4be39c01631a26583b6df6546531a4b5047ce75f501f82f7fd729e8"
          provided_sha256="$(printf '%s' "${{ github.event.inputs.release_guard }}" | sha256sum | awk '{print $1}')"
          if [ "$provided_sha256" != "$expected_sha256" ]; then
            echo "BLOCKED: run scripts/release-safe.sh"
            exit 1
          fi
          echo "PASS: release guard validated"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve latest component versions
        id: manifest
        run: |
          MANIFEST=$(jq -c '.[]' components.json | while read component; do
            ID=$(echo "$component" | jq -r '.id')
            TAG=$(gh release view --repo slidebolt/$ID --json tagName -q .tagName 2>/dev/null || echo "")
            if [ -z "$TAG" ]; then
              echo "ERROR: could not resolve latest release for $ID" >&2
              exit 1
            fi
            echo "$component" | jq --arg tag "$TAG" '. + {tag: $tag}'
          done | jq -s '.')

          echo "$MANIFEST" > manifest.json
          echo "manifest<<EOF" >> $GITHUB_OUTPUT
          echo "$MANIFEST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo $CURRENT | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "release: ${{ steps.version.outputs.version }}"
          git tag ${{ steps.version.outputs.version }}
          git push origin main --tags

      - name: Build component version labels
        id: labels
        run: |
          LABELS=$(jq -r '.[] | "org.slidebolt.\(.id)=\(.tag)"' manifest.json | tr '\n' '\n')
          echo "labels<<EOF" >> $GITHUB_OUTPUT
          echo "$LABELS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/slidebolt/release
            ${{ steps.labels.outputs.labels }}

      - name: Set GHCR package visibility to public
        run: |
          set +e
          PACKAGE_NAME=slidebolt
          OWNER="${{ github.repository_owner }}"

          gh api \
            --method PATCH \
            "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/visibility" \
            -f visibility=public
          status=$?
          if [ $status -ne 0 ]; then
            gh api \
            --method PATCH \
            "/user/packages/container/${PACKAGE_NAME}/visibility" \
            -f visibility=public
            status=$?
          fi
          if [ $status -ne 0 ]; then
            echo "Warning: could not set GHCR visibility to public; continuing release."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          NOTES=$(jq -r '.[] | "- **\(.id)**: \(.tag)"' manifest.json)
          gh release create ${{ steps.version.outputs.version }} \
            --repo slidebolt/release \
            --title "${{ steps.version.outputs.version }}" \
            --latest \
            --notes "## Components

          $NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
