name: Release Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Released Binaries
        run: ./fetch-binaries.sh

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Image Tags
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_tag="${GITHUB_REF_NAME}"
            {
              echo "tags<<EOF"
              echo "ghcr.io/slidebolt/slidebolt:${version_tag}"
              echo "ghcr.io/slidebolt/slidebolt:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build Image
        run: docker build -t ghcr.io/slidebolt/slidebolt:ci .

      - name: Smoke Test Image
        run: |
          docker run --rm --entrypoint /bin/sh ghcr.io/slidebolt/slidebolt:ci -lc '
            test -x /app/.bin/sb-manager &&
            test -x /app/.bin/sb-messenger &&
            test -x /app/.bin/sb-storage &&
            test -x /app/.bin/sb-api &&
            test -x /app/.bin/plugin-zigbee2mqtt
          '

      - name: Tag Image
        shell: bash
        run: |
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            docker tag ghcr.io/slidebolt/slidebolt:ci "${tag}"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Push Image
        shell: bash
        run: |
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            docker push "${tag}"
          done <<< "${{ steps.meta.outputs.tags }}"
